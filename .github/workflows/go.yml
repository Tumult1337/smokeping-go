name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  binary:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Copy UI
        run: |
          mkdir -p internal/ui/dist
          cp -r ui/dist/* internal/ui/dist/

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Build binary
        run: |
          mkdir -p build
          go build -trimpath -ldflags="-s -w" -o build/gosmokeping ./cmd/gosmokeping

      - uses: actions/upload-artifact@v4
        with:
          name: gosmokeping-linux-amd64
          path: build/gosmokeping

  docker:
    runs-on: ubuntu-latest
    needs: binary
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: gosmokeping:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
