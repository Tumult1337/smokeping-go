*** General ***
owner = Alice

*** Presentation ***
template = /etc/smokeping/basepage.html
charset = utf-8

*** Database ***
step = 60
pings = 20

*** Probes ***
+ FPing
timeout = 5

+ AnotherSSH
binary = /usr/bin/ssh

*** Alerts ***
+ weird
type = rtt
pattern = <10,<10,<10,>100,>100

*** Targets ***
probe = FPing

+ host1
host = host1.example.com

+ ssh-only
probe = AnotherSSH
host = ssh.example.com
