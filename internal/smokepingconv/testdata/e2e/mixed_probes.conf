*** Database ***
step = 60
pings = 20

*** Probes ***
+ FPing
timeout = 5

+ Curl
urlformat = https://%host%/
insecure_ssl = yes

+ TCPPing
port = 443
timeout = 2

+ DNS
timeout = 3

*** Alerts ***
+ bigloss
type = loss
pattern = >50%,>50%,>50%

+ slow
type = rtt
pattern = >100,>100

*** Targets ***
probe = FPing

+ network
menu = Network
++ cloudflare
host = 1.1.1.1

+ web
menu = Web
probe = Curl
++ example
host = example.com
alerts = slow

+ services
menu = Services
++ api
probe = TCPPing
host = api.example.com
